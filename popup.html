<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Naukri Smart Filters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e222e;
      --border: #2a2f3d;
      --accent: #ff6b35;
      --accent2: #ff9f1c;
      --green: #2ecc71;
      --red: #e74c3c;
      --text: #e8eaf0;
      --muted: #6b7280;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      min-height: 520px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 800;
      color: #fff;
      font-family: 'Syne', sans-serif;
    }
    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 800;
      letter-spacing: -0.3px;
    }
    header span { font-size: 11px; color: var(--muted); display: block; }
    .toggle-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .toggle-label { font-size: 12px; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .toggle {
      position: relative; width: 40px; height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0; cursor: pointer;
      background: var(--border); border-radius: 22px;
      transition: .3s;
    }
    .slider:before {
      content: ''; position: absolute;
      height: 16px; width: 16px;
      left: 3px; bottom: 3px;
      background: white; border-radius: 50%;
      transition: .3s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(18px); }

    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1; padding: 10px 6px;
      text-align: center; font-size: 11px;
      font-family: 'Syne', sans-serif; font-weight: 600;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s; letter-spacing: 0.3px;
      text-transform: uppercase;
    }
    .tab.active { color: var(--accent); border-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    .panel { display: none; padding: 16px 18px; }
    .panel.active { display: block; }

    .field-group { margin-bottom: 14px; }
    label { display: block; font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%; padding: 8px 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      outline: none; transition: border .2s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }

    .range-row { display: flex; gap: 8px; align-items: center; }
    .range-row input { flex: 1; }
    .range-row span { color: var(--muted); font-size: 12px; }

    .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 9px; font-size: 11px;
    }
    .tag .remove {
      cursor: pointer; color: var(--muted); font-size: 13px;
      line-height: 1; transition: color .15s;
    }
    .tag .remove:hover { color: var(--red); }
    .tag-input-row { display: flex; gap: 6px; }
    .tag-input-row input { flex: 1; }
    .btn-sm {
      padding: 7px 12px; border-radius: var(--radius);
      background: var(--accent); color: #fff;
      border: none; cursor: pointer; font-size: 12px;
      font-family: 'Syne', sans-serif; font-weight: 700;
      white-space: nowrap; transition: opacity .2s;
    }
    .btn-sm:hover { opacity: .85; }
    .btn-sm.secondary { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }

    .save-btn {
      display: block; width: calc(100% - 36px); margin: 0 18px 16px;
      padding: 11px; border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff; border: none; cursor: pointer;
      font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      transition: opacity .2s, transform .1s;
    }
    .save-btn:hover { opacity: .9; transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 14px;
    }
    .stat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      text-align: center;
    }
    .stat-card .num { font-size: 22px; font-family: 'Syne', sans-serif; font-weight: 800; }
    .stat-card .lbl { font-size: 10px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .num.green { color: var(--green); }
    .num.red { color: var(--red); }
    .num.orange { color: var(--accent); }

    .info-box {
      background: var(--surface2); border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius); padding: 10px 12px;
      font-size: 12px; color: var(--muted); line-height: 1.6;
    }
    .toast {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #fff; padding: 8px 18px;
      border-radius: 20px; font-size: 12px; font-family: 'Syne', sans-serif;
      font-weight: 700; letter-spacing: 0.5px;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    .checkbox-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; cursor: pointer;
    }
    .checkbox-row input[type="checkbox"] {
      width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer;
    }
    .checkbox-row span { font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Naukri Smart Filters</h1>
      <span>Custom job filtering engine</span>
    </div>
  </header>

  <div class="toggle-bar">
    <span class="toggle-label">Filters Active</span>
    <label class="toggle">
      <input type="checkbox" id="masterToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="jobs">💰 Jobs</div>
    <div class="tab" data-tab="interests">🏢 Early Access Interests</div>
  </div>

  <!-- JOBS PANEL -->
  <div class="panel active" id="panel-jobs">
    <div class="field-group">
      <label>Posted Within</label>
      <select id="postedWithin">
        <option value="">Any time</option>
        <option value="1">Last 1 day</option>
        <option value="3">Last 3 days</option>
        <option value="7">Last 7 days</option>
        <option value="15">Last 15 days</option>
        <option value="30">Last 30 days</option>
      </select>
    </div>
    <div class="field-group">
      <label>Total Experience (Years)</label>
      <input type="number" id="totalExp" placeholder="Total Exp (in years)" min="0" max="50" />
    </div>
  </div>

  <!-- EARLY ACCESS INTERESTS PANEL -->
  <div class="panel" id="panel-interests">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="num green" id="visibleCount">–</div>
        <div class="lbl">Visible Jobs</div>
      </div>
      <div class="stat-card">
        <div class="num red" id="hiddenCount">–</div>
        <div class="lbl">Filtered Out</div>
      </div>
      <div class="stat-card">
        <div class="num orange" id="totalCount">–</div>
        <div class="lbl">Total Found</div>
      </div>
      <div class="stat-card">
        <div class="num" id="filterRatio" style="color:var(--accent2)">–</div>
        <div class="lbl">Filter Rate</div>
      </div>
    </div>
    <div class="info-box">
      Filters apply automatically as you browse Naukri. Refresh the page after saving filters to re-apply them to current results.
    </div>
    <hr class="divider"/>
    <button class="btn-sm secondary" id="resetStats" style="width:100%;margin-bottom:8px">Reset Stats</button>
    <button class="btn-sm secondary" id="clearAll" style="width:100%">Clear All Filters</button>
  </div>

  <button class="save-btn" id="saveBtn">Save & Apply Filters</button>
  <div class="toast" id="toast">✓ Filters saved!</div>

  <script src="popup.js"></script>
</body>
</html>
